# GitHub Actions Workflow for launching UI tests on Linux, Windows, and Mac in the following steps:
# - Prepare and launch IDE with your plugin and robot-server plugin, which is needed to interact with the UI.
# - Wait for IDE to start.
# - Run UI tests with a separate Gradle task.
#
# Please check https://github.com/JetBrains/intellij-ui-test-robot for information about UI tests with IntelliJ Platform.
#
# Workflow is triggered manually.

name: Run UI Tests
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:

  testUI:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v6

      # Set up the Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: Run IDE on Linux
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          export DISPLAY=:99.0
          Xvfb -ac :99 -screen 0 1920x1080x16 > xfvb.log 2>&1 &
          nohup ./gradlew runIdeForUiTests --stacktrace --console=plain > ui-ide.log 2>&1 &

      - name: Run IDE on macOS
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          nohup ./gradlew runIdeForUiTests --stacktrace --console=plain > ui-ide.log 2>&1 &

      - name: Run IDE on Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Start-Process -FilePath .\gradlew.bat `
            -ArgumentList 'runIdeForUiTests','--stacktrace','--console=plain' `
            -RedirectStandardOutput 'ui-ide.log' `
            -RedirectStandardError 'ui-ide.err.log'

      # Wait for IDEA to be started
      - name: Health Check
        uses: jtalk/url-health-check-action@v5
        with:
          url: http://127.0.0.1:8082
          max-attempts: 15
          retry-delay: 30s

      # Run tests
      - name: Tests
        run: ./gradlew testUi

      - name: Show IDE Logs On Failure
        if: failure()
        shell: bash
        run: |
          if [ -f ui-ide.log ]; then
            echo "===== ui-ide.log ====="
            tail -n 200 ui-ide.log
          fi
          if [ -f ui-ide.err.log ]; then
            echo "===== ui-ide.err.log ====="
            tail -n 200 ui-ide.err.log
          fi
          if [ -f xfvb.log ]; then
            echo "===== xfvb.log ====="
            tail -n 100 xfvb.log
          fi

      - name: Upload UI Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-logs-${{ matrix.os }}
          path: |
            ui-ide.log
            ui-ide.err.log
            xfvb.log
