# GitHub Actions Workflow for launching UI tests on Linux, Windows, and Mac in the following steps:
# - Prepare and launch IDE with your plugin and robot-server plugin, which is needed to interact with the UI.
# - Wait for IDE to start.
# - Run UI tests with a separate Gradle task.
#
# Please check https://github.com/JetBrains/intellij-ui-test-robot for information about UI tests with IntelliJ Platform.
#
# Workflow is triggered manually.

name: UITests
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:

  testUI:
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      UI_PLATFORM_TYPE: IC
      UI_PLATFORM_VERSION: 2025.1.5
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v6

      # Set up the Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: Warm Up Gradle
        shell: bash
        run: ./gradlew help --no-configuration-cache --console=plain -PplatformType=${UI_PLATFORM_TYPE} -PplatformVersion=${UI_PLATFORM_VERSION}

      - name: Prepare UI Test Sandbox
        shell: bash
        run: ./gradlew prepareSandbox_runIdeForUiTests --no-configuration-cache --console=plain -PplatformType=${UI_PLATFORM_TYPE} -PplatformVersion=${UI_PLATFORM_VERSION}

      - name: Run IDE on Linux
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          export DISPLAY=:99.0
          Xvfb -ac :99 -screen 0 1920x1080x16 > xfvb.log 2>&1 &
          nohup ./gradlew runIdeForUiTests --no-configuration-cache --stacktrace --console=plain --info -PplatformType=${UI_PLATFORM_TYPE} -PplatformVersion=${UI_PLATFORM_VERSION} > ui-ide.log 2>&1 &
          echo $! > ui-ide.pid

      - name: Run IDE on macOS
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          nohup ./gradlew runIdeForUiTests --no-configuration-cache --stacktrace --console=plain --info -PplatformType=${UI_PLATFORM_TYPE} -PplatformVersion=${UI_PLATFORM_VERSION} > ui-ide.log 2>&1 &
          echo $! > ui-ide.pid

      - name: Run IDE on Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $process = Start-Process -FilePath .\gradlew.bat `
            -ArgumentList 'runIdeForUiTests','--no-configuration-cache','--stacktrace','--console=plain','--info',"-PplatformType=$env:UI_PLATFORM_TYPE","-PplatformVersion=$env:UI_PLATFORM_VERSION" `
            -RedirectStandardOutput 'ui-ide.log' `
            -RedirectStandardError 'ui-ide.err.log' `
            -PassThru
          Set-Content -Path ui-ide.pid -Value $process.Id
          Start-Sleep -Seconds 10
          if ($process.HasExited) {
            Write-Host "runIdeForUiTests exited early with code $($process.ExitCode)"
            if (Test-Path ui-ide.log) { Get-Content ui-ide.log }
            if (Test-Path ui-ide.err.log) { Get-Content ui-ide.err.log }
            exit 1
          }
          Write-Host "Started runIdeForUiTests PID=$($process.Id)"

      - name: Wait for Robot Server on Linux/macOS
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          for attempt in $(seq 1 90); do
            if curl --connect-timeout 3 --max-time 5 -fsS http://127.0.0.1:8082 >/dev/null; then
              echo "Robot server is ready on attempt $attempt" | tee -a robot-wait.log
              exit 0
            fi
            echo "Robot server not ready yet (attempt $attempt/90)" | tee -a robot-wait.log
            if [ -f ui-ide.pid ]; then
              echo "PID=$(cat ui-ide.pid)" | tee -a robot-wait.log
              ps -p "$(cat ui-ide.pid)" -o pid=,ppid=,etime=,stat=,command= | tee -a robot-wait.log || true
            fi
            if [ -f ui-ide.log ]; then
              tail -n 20 ui-ide.log | tee -a robot-wait.log || true
            fi
            sleep 15
          done
          echo "Robot server did not become ready in time" | tee -a robot-wait.log
          exit 1

      - name: Wait for Robot Server on Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          for ($attempt = 1; $attempt -le 90; $attempt++) {
            try {
              Invoke-WebRequest -UseBasicParsing -Uri 'http://127.0.0.1:8082' -TimeoutSec 5 | Out-Null
              "Robot server is ready on attempt $attempt" | Tee-Object -FilePath robot-wait.log -Append
              exit 0
            } catch {
              "Robot server not ready yet (attempt $attempt/90)" | Tee-Object -FilePath robot-wait.log -Append
            }
            if (Test-Path ui-ide.pid) {
              $uiIdePid = (Get-Content ui-ide.pid | Select-Object -First 1).Trim()
              "PID=$uiIdePid" | Tee-Object -FilePath robot-wait.log -Append
              Get-Process -Id $uiIdePid -ErrorAction SilentlyContinue | Format-Table -AutoSize | Out-String | Tee-Object -FilePath robot-wait.log -Append
            }
            if (Test-Path ui-ide.log) { Get-Content ui-ide.log -Tail 20 | Tee-Object -FilePath robot-wait.log -Append }
            if (Test-Path ui-ide.err.log) { Get-Content ui-ide.err.log -Tail 20 | Tee-Object -FilePath robot-wait.log -Append }
            Start-Sleep -Seconds 15
          }
          Write-Error "Robot server did not become ready in time"

      # Run tests
      - name: Tests
        env:
          RUN_UI_TESTS: "true"
        run: ./gradlew testUi --no-configuration-cache --console=plain -PplatformType=${{ env.UI_PLATFORM_TYPE }} -PplatformVersion=${{ env.UI_PLATFORM_VERSION }}

      - name: Dump Remote Robot DOM On Failure
        if: failure()
        shell: bash
        run: |
          curl --connect-timeout 5 --max-time 15 -sS http://127.0.0.1:8082 > remote-robot-dom.html || true
          if [ -f remote-robot-dom.html ]; then
            echo "===== remote-robot-dom excerpt ====="
            rg -n "Welcome|IdeFrameImpl|InterceptWave|Recent Projects|Configure|Start All|SquareStripeButton|ToolWindow|Manage Licenses|Meet the Islands Theme|Skip|Trust" remote-robot-dom.html | sed -n '1,250p' || true
          fi

      - name: Show IDE Logs On Failure
        if: failure()
        shell: bash
        run: |
          if [ -f ui-ide.log ]; then
            echo "===== ui-ide.log ====="
            tail -n 200 ui-ide.log
          fi
          if [ -f ui-ide.err.log ]; then
            echo "===== ui-ide.err.log ====="
            tail -n 200 ui-ide.err.log
          fi
          if [ -f xfvb.log ]; then
            echo "===== xfvb.log ====="
            tail -n 100 xfvb.log
          fi

      - name: Show Windows Process State On Failure
        if: failure() && matrix.platform == 'windows'
        shell: pwsh
        run: |
          Write-Host "===== gradle/java processes ====="
          Get-Process | Where-Object { $_.ProcessName -match 'gradle|java' } | Format-Table -AutoSize

      - name: Upload UI Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-logs-${{ matrix.os }}
          path: |
            ui-ide.log
            ui-ide.err.log
            ui-ide.pid
            robot-wait.log
            xfvb.log
            remote-robot-dom.html
