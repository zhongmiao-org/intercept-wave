# GitHub Actions Workflow for launching UI tests on Linux, Windows, and Mac in the following steps:
# - Prepare and launch IDE with your plugin and robot-server plugin, which is needed to interact with the UI.
# - Wait for IDE to start.
# - Run UI tests with a separate Gradle task.
#
# Please check https://github.com/JetBrains/intellij-ui-test-robot for information about UI tests with IntelliJ Platform.
#
# Workflow is triggered manually.

name: UITests
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:

  testUI:
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      UI_PLATFORM_TYPE: IC
      UI_PLATFORM_VERSION: 2025.1.5
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v6

      # Set up the Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: Warm Up Gradle
        shell: bash
        run: ./gradlew help --no-configuration-cache --console=plain -PplatformType=${UI_PLATFORM_TYPE} -PplatformVersion=${UI_PLATFORM_VERSION}

      - name: Run IDE on Linux
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          export DISPLAY=:99.0
          Xvfb -ac :99 -screen 0 1920x1080x16 > xfvb.log 2>&1 &
          nohup ./gradlew runIdeForUiTests --no-configuration-cache --stacktrace --console=plain -PplatformType=${UI_PLATFORM_TYPE} -PplatformVersion=${UI_PLATFORM_VERSION} > ui-ide.log 2>&1 &

      - name: Run IDE on macOS
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          nohup ./gradlew runIdeForUiTests --no-configuration-cache --stacktrace --console=plain -PplatformType=${UI_PLATFORM_TYPE} -PplatformVersion=${UI_PLATFORM_VERSION} > ui-ide.log 2>&1 &

      - name: Run IDE on Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $process = Start-Process -FilePath .\gradlew.bat `
            -ArgumentList 'runIdeForUiTests','--no-configuration-cache','--stacktrace','--console=plain',"-PplatformType=$env:UI_PLATFORM_TYPE","-PplatformVersion=$env:UI_PLATFORM_VERSION" `
            -RedirectStandardOutput 'ui-ide.log' `
            -RedirectStandardError 'ui-ide.err.log' `
            -PassThru
          "Started runIdeForUiTests PID=$($process.Id)" | Out-File -FilePath ui-ide.log -Append
          Start-Sleep -Seconds 10
          if ($process.HasExited) {
            "runIdeForUiTests exited early with code $($process.ExitCode)" | Out-File -FilePath ui-ide.log -Append
            Get-Content ui-ide.log
            if (Test-Path ui-ide.err.log) { Get-Content ui-ide.err.log }
            exit 1
          }

      # Wait for IDEA to be started
      - name: Health Check
        uses: jtalk/url-health-check-action@v5
        with:
          url: http://127.0.0.1:8082
          max-attempts: 30
          retry-delay: 30s

      # Run tests
      - name: Tests
        env:
          RUN_UI_TESTS: "true"
        run: ./gradlew testUi --no-configuration-cache --console=plain -PplatformType=${{ env.UI_PLATFORM_TYPE }} -PplatformVersion=${{ env.UI_PLATFORM_VERSION }}

      - name: Dump Remote Robot DOM On Failure
        if: failure()
        shell: bash
        run: |
          curl --connect-timeout 5 --max-time 15 -sS http://127.0.0.1:8082 > remote-robot-dom.html || true
          if [ -f remote-robot-dom.html ]; then
            echo "===== remote-robot-dom excerpt ====="
            rg -n "Welcome|IdeFrameImpl|InterceptWave|Recent Projects|Configure|Start All|SquareStripeButton|ToolWindow|Manage Licenses|Meet the Islands Theme|Skip|Trust" remote-robot-dom.html | sed -n '1,250p' || true
          fi

      - name: Show IDE Logs On Failure
        if: failure()
        shell: bash
        run: |
          if [ -f ui-ide.log ]; then
            echo "===== ui-ide.log ====="
            tail -n 200 ui-ide.log
          fi
          if [ -f ui-ide.err.log ]; then
            echo "===== ui-ide.err.log ====="
            tail -n 200 ui-ide.err.log
          fi
          if [ -f xfvb.log ]; then
            echo "===== xfvb.log ====="
            tail -n 100 xfvb.log
          fi

      - name: Upload UI Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-logs-${{ matrix.os }}
          path: |
            ui-ide.log
            ui-ide.err.log
            xfvb.log
            remote-robot-dom.html
